<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Setup - Tic Tac Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="game-header">
            <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
            <h1 class="game-title">Game Setup</h1>
            <div class="theme-wrapper">
                <button class="theme-toggle" id="themeToggle" title="Switch Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <section class="mode-selection" id="modeSection">
            <h3><i class="fas fa-gamepad"></i> Select Mode</h3>
            <div class="mode-buttons" style="margin-top: 1rem;">
                <button class="mode-btn active" data-mode="pvp">
                    <i class="fas fa-users"></i> Player vs Player
                </button>
                <button class="mode-btn" data-mode="ai">
                    <i class="fas fa-robot"></i> Player vs AI
                </button>
                <button class="mode-btn" data-mode="tournament" id="tournamentBtn">
                    <i class="fas fa-crown"></i> Tournament
                </button>
            </div>
            
            <div id="tournamentSettings" style="display:none; margin-top: 1rem; padding: 1rem; background: var(--bg-tertiary); border-radius: 8px;">
                <label style="display:block; margin-bottom: 0.5rem; font-weight: 600;">Best of:</label>
                <div class="best-of-selector">
                    <button class="best-of-btn active" data-best="3">3</button>
                    <button class="best-of-btn" data-best="5">5</button>
                </div>
            </div>
        </section>

        <section class="player-names" id="namesSection" style="margin-top: 1.5rem; flex-direction: column; gap: 1rem;">
            <h3><i class="fas fa-user-edit"></i> Player Names</h3>
            
            <div style="width: 100%; display: flex; align-items: center; gap: 1rem;">
                <button class="avatar-btn" id="avatarXBtn"><i class="fas fa-times"></i></button>
                <input type="text" id="playerXName" placeholder="Player X" maxlength="12" style="flex: 1; padding: 0.8rem; border-radius: 8px; border: 2px solid var(--border-color);">
            </div>

            <div style="width: 100%; display: flex; align-items: center; gap: 1rem;">
                <button class="avatar-btn" id="avatarOBtn"><i class="fas fa-circle"></i></button>
                <input type="text" id="playerOName" placeholder="Player O" maxlength="12" style="flex: 1; padding: 0.8rem; border-radius: 8px; border: 2px solid var(--border-color);">
            </div>
        </section>

        <section class="difficulty-selection" id="difficultySection" style="display: none; margin-top: 1.5rem;">
            <h3><i class="fas fa-brain"></i> AI Difficulty</h3>
            <div class="difficulty-buttons" style="margin-top: 0.5rem;">
                <button class="diff-btn" data-difficulty="easy"><i class="fas fa-smile"></i> Easy</button>
                <button class="diff-btn active" data-difficulty="medium"><i class="fas fa-meh"></i> Medium</button>
                <button class="diff-btn" data-difficulty="hard"><i class="fas fa-frown"></i> Hard</button>
            </div>
        </section>

        <div style="margin-top: 2rem;">
            <button id="startGameBtn" class="menu-btn primary" style="width: 100%; justify-content: center;">
                Start Game <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- Avatar Modal -->
        <div class="modal" id="avatarModal">
            <div class="modal-content small">
                <h3 class="modal-title"><i class="fas fa-user-circle"></i> Choose Avatar</h3>
                <div class="avatar-grid" id="avatarGrid"></div>
                <button class="modal-btn" id="closeAvatarModal"><i class="fas fa-times"></i> Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Setup Logic
        document.addEventListener('DOMContentLoaded', () => {
            const modeBtns = document.querySelectorAll('.mode-btn');
            const diffSection = document.getElementById('difficultySection');
            const diffBtns = document.querySelectorAll('.diff-btn');
            const startBtn = document.getElementById('startGameBtn');
            const pXInput = document.getElementById('playerXName');
            const pOInput = document.getElementById('playerOName');
            const tourneySettings = document.getElementById('tournamentSettings');
            const bestOfBtns = document.querySelectorAll('.best-of-btn');
            
            let currentMode = 'pvp';
            let currentDiff = 'medium';
            let currentBestOf = 3;
            let avatars = { X: 'fa-times', O: 'fa-circle' };
            const state = new GameState();

            // Load saved
            const savedState = state.state;
            pXInput.value = savedState.players.x.name;
            pOInput.value = savedState.players.o.name;
            avatars = { X: savedState.players.x.avatar, O: savedState.players.o.avatar };
            updateAvatar(savedState.players.x.avatar, 'X');
            updateAvatar(savedState.players.o.avatar, 'O');

            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    if(btn.disabled) return;
                    modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMode = btn.dataset.mode;
                    
                    // Reset sections
                    diffSection.style.display = 'none';
                    tourneySettings.style.display = 'none';
                    pOInput.disabled = false;
                    if(pOInput.value === 'AI Bot') pOInput.value = savedState.players.o.name || 'Player O';

                    if(currentMode === 'ai') {
                        diffSection.style.display = 'block';
                        pOInput.value = 'AI Bot';
                        pOInput.disabled = true;
                    } else if(currentMode === 'tournament') {
                        tourneySettings.style.display = 'block';
                    }
                });
            });

            bestOfBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    bestOfBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentBestOf = parseInt(btn.dataset.best);
                });
            });

            diffBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    diffBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDiff = btn.dataset.difficulty;
                });
            });

            // Avatar Logic
            const avatarModal = document.getElementById('avatarModal');
            const avatarGrid = document.getElementById('avatarGrid');
            const closeAvatar = document.getElementById('closeAvatarModal');
            let pickingFor = 'X';

            const avatarIcons = [
                'fa-times', 'fa-circle', 'fa-star', 'fa-heart', 'fa-bolt', 'fa-fire',
                'fa-gem', 'fa-crown', 'fa-diamond', 'fa-dragon', 'fa-ghost', 'fa-robot'
            ];

            avatarGrid.innerHTML = avatarIcons.map(icon => 
                `<button class="avatar-option" data-avatar="${icon}">
                    <i class="fas ${icon}"></i>
                </button>`
            ).join('');

            avatarGrid.querySelectorAll('.avatar-option').forEach(btn => {
                btn.addEventListener('click', () => {
                    const icon = btn.dataset.avatar;
                    avatars[pickingFor] = icon;
                    updateAvatar(icon, pickingFor);
                    avatarModal.classList.remove('show');
                });
            });

            document.getElementById('avatarXBtn').addEventListener('click', () => {
                pickingFor = 'X';
                avatarModal.classList.add('show');
            });

            document.getElementById('avatarOBtn').addEventListener('click', () => {
                pickingFor = 'O';
                avatarModal.classList.add('show');
            });

            closeAvatar.addEventListener('click', () => avatarModal.classList.remove('show'));

            function updateAvatar(icon, player) {
                const btn = document.getElementById(player === 'X' ? 'avatarXBtn' : 'avatarOBtn');
                btn.innerHTML = `<i class="fas ${icon}" class="avatar ${player.toLowerCase()}"></i>`;
                if(player === 'X') btn.querySelector('i').style.color = 'var(--accent-x)';
                else btn.querySelector('i').style.color = 'var(--accent-o)';
            }


            startBtn.addEventListener('click', () => {
                state.set('gameMode', currentMode);
                state.set('difficulty', currentDiff);
                state.state.players.x.name = pXInput.value || 'Player X';
                state.state.players.o.name = pOInput.value || 'Player O';
                state.state.players.x.avatar = avatars.X;
                state.state.players.o.avatar = avatars.O;
                // Save tournament settings
                state.state.tournament = { bestOf: currentBestOf, round: 1, wins: { x: 0, o: 0 } };
                state.save();
                window.location.href = 'play.html';
            });
        });
    </script>

    <script src="js/theme.js"></script>
</body>
</html>
