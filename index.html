<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Advanced Tic Tac Toe Game">
    <title>Tic Tac Toe</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❌</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="game-header">
            <h1 class="game-title">
                <i class="fas fa-times"></i>
                Tic Tac Toe
                <i class="fas fa-circle"></i>
            </h1>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <div class="top-controls">
            <button class="sound-btn" id="soundToggle" aria-label="Toggle sound">
                <i class="fas fa-volume-up" id="soundIcon"></i>
            </button>
            <button class="icon-btn" id="undoBtn" aria-label="Undo" title="Undo (Z)">
                <i class="fas fa-undo"></i>
            </button>
            <button class="icon-btn" id="redoBtn" aria-label="Redo" title="Redo (Y)">
                <i class="fas fa-redo"></i>
           
            <button class="icon-btn" id="statsBtn" aria-label="Stats" title="Stats">
                <i class="fas fa-chart-bar"></i>
            </button>
            <button class="icon-btn" id="achievementsBtn" aria-label="Achievements" title="Achievements">
                <i class="fas fa-trophy"></i>
            </button>
        </div>

        <section class="player-names">
            <div class="player-name-input">
                <button class="avatar-btn" id="avatarXBtn">
                    <span class="avatar" id="avatarX"><i class="fas fa-times"></i></span>
                </button>
                <input type="text" id="playerXName" placeholder="Player X" maxlength="12">
            </div>
            <div class="vs">VS</div>
            <div class="player-name-input">
                <input type="text" id="playerOName" placeholder="Player O" maxlength="12">
                <button class="avatar-btn" id="avatarOBtn">
                    <span class="avatar" id="avatarO"><i class="fas fa-circle"></i></span>
                </button>
            </div>
        </section>

        <div class="modal" id="avatarModal">
            <div class="modal-content small">
                <h3 class="modal-title"><i class="fas fa-user-circle"></i> Choose Avatar</h3>
                <div class="avatar-grid" id="avatarGrid"></div>
                <button class="modal-btn" id="closeAvatarModal"><i class="fas fa-times"></i> Cancel</button>
            </div>
        </div>

        <section class="mode-selection">
            <div class="mode-buttons">
                <button class="mode-btn active" data-mode="pvp" id="pvpBtn">
                    <i class="fas fa-users"></i> PvP
                </button>
                <button class="mode-btn" data-mode="ai" id="aiBtn">
                    <i class="fas fa-robot"></i> PvAI
                </button>
                <button class="mode-btn" data-mode="tournament" id="tournamentBtn">
                    <i class="fas fa-crown"></i> Tournament
                </button>
            </div>
        </section>

        <section class="tournament-settings" id="tournamentSettings" style="display:none;">
            <div class="tournament-info">
                <span id="tournamentRound"><i class="fas fa-list-ol"></i> Round 1/3</span>
                <span id="tournamentScore"><i class="fas fa-scoreboard"></i> X: 0 - O: 0</span>
            </div>
            <div class="best-of-selector">
                <span>Best of:</span>
                <button class="best-of-btn active" data-best="3">3</button>
                <button class="best-of-btn" data-best="5">5</button>
            </div>
        </section>

        <section class="difficulty-selection" id="difficultySection" style="display:none;">
            <div class="difficulty-buttons">
                <button class="diff-btn" data-difficulty="easy"><i class="fas fa-smile"></i> Easy</button>
                <button class="diff-btn active" data-difficulty="medium"><i class="fas fa-meh"></i> Medium</button>
                <button class="diff-btn" data-difficulty="hard"><i class="fas fa-frown"></i> Hard</button>
            </div>
        </section>

        <div class="game-status" id="gameStatus"><i class="fas fa-gamepad"></i> Player X's Turn</div>

        <main class="game-board-container">
            <div class="game-board" id="gameBoard">
                <button class="cell" data-index="0"></button>
                <button class="cell" data-index="1"></button>
                <button class="cell" data-index="2"></button>
                <button class="cell" data-index="3"></button>
                <button class="cell" data-index="4"></button>
                <button class="cell" data-index="5"></button>
                <button class="cell" data-index="6"></button>
                <button class="cell" data-index="7"></button>
                <button class="cell" data-index="8"></button>
            </div>
            <div class="particles" id="particles"></div>
        </main>

        <section class="scoreboard">
            <div class="score-card x-score">
                <span class="player-icon" id="scoreIconX"><i class="fas fa-times"></i></span>
                <span class="score-label" id="scoreLabelX">Player X</span>
                <span class="score-value" id="xScore">0</span>
            </div>
            <div class="score-card draw-score">
                <span class="score-label"><i class="fas fa-handshake"></i> Draws</span>
                <span class="score-value" id="drawScore">0</span>
            </div>
            <div class="score-card o-score">
                <span class="player-icon" id="scoreIconO"><i class="fas fa-circle"></i></span>
                <span class="score-label" id="scoreLabelO">Player O</span>
                <span class="score-value" id="oScore">0</span>
            </div>
        </section>

        <div class="control-buttons">
            <button class="control-btn restart-btn" id="restartBtn">
                <i class="fas fa-redo"></i> Restart
            </button>
            <button class="control-btn reset-btn" id="resetBtn">
                <i class="fas fa-trash-alt"></i> Reset
            </button>
            <button class="control-btn share-btn" id="shareBtn">
                <i class="fas fa-share-alt"></i> Share
            </button>
        </div>

        <div class="current-player" id="currentPlayerIndicator">
            <span class="current-icon" id="currentPlayerIcon"><i class="fas fa-times"></i></span>
            <span id="currentPlayerText">Player X's Turn</span>
        </div>

        <div class="ai-loading" id="aiLoading">
            <span class="thinking-dots"><span></span><span></span><span></span></span>
        </div>

        <div class="replay-controls" id="replayControls" style="display:none;">
            <button class="icon-btn" id="replayPrev"><i class="fas fa-step-backward"></i></button>
            <button class="icon-btn" id="replayPlay"><i class="fas fa-play"></i></button>
            <button class="icon-btn" id="replayNext"><i class="fas fa-step-forward"></i></button>
            <span id="replayStep"><i class="fas fa-list"></i> Move 0/0</span>
            <button class="icon-btn" id="replayClose"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon"><i class="fas fa-trophy"></i></div>
            <h2 class="modal-title" id="modalTitle"><i class="fas fa-flag-checkered"></i> Game Over!</h2>
            <p class="modal-message" id="modalMessage">Player X Wins!</p>
            <button class="modal-btn" id="modalBtn"><i class="fas fa-play"></i> Play Again</button>
        </div>
    </div>

    <div class="modal" id="statsModal">
        <div class="modal-content">
            <h2 class="modal-title"><i class="fas fa-chart-bar"></i> Statistics</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-games"></i> Total Games</div>
                    <div class="stat-value" id="statTotal">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-percentage"></i> Win Rate</div>
                    <div class="stat-value" id="statWinRate">0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-fire"></i> Current Streak</div>
                    <div class="stat-value" id="statStreak">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-star"></i> Best Streak</div>
                    <div class="stat-value" id="statBestStreak">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-bolt"></i> Fastest Win</div>
                    <div class="stat-value" id="statFastest">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-check-double"></i> Perfect Games</div>
                    <div class="stat-value" id="statPerfect">0</div>
                </div>
            </div>
            <button class="modal-btn" id="closeStatsModal"><i class="fas fa-times"></i> Close</button>
        </div>
    </div>

    <div class="modal" id="achievementsModal">
        <div class="modal-content">
            <h2 class="modal-title"><i class="fas fa-trophy"></i> Achievements</h2>
            <div class="achievements-list" id="achievementsList"></div>
            <button class="modal-btn" id="closeAchievementsModal"><i class="fas fa-times"></i> Close</button>
        </div>
    </div>

    <div class="achievement-toast" id="achievementToast">
        <i class="fas fa-trophy"></i>
        <span id="achievementText">Achievement Unlocked!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
